default_task_verify_pre: &default_task_verify_pre
  account: '&ACCOUNT;'
  attrs:
    cycledefs: cycledefs_obs_days_inst
    maxtries: '1'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    USHdir: '&USHdir;'
    PDY:
      cyclestr:
        value: '@Y@m@d'
    cyc:
      cyclestr:
        value: '@H'
    subcyc:
      cyclestr:
        value: '@M'
    LOGDIR:
      cyclestr:
        value: '&LOGDIR;'
    nprocs: '{{ verification_resources.execution.nodes * verification_resources.execution.tasks_per_node }}'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  memory: '{{ "2G" if user.MACHINE not in ["NOAACLOUD"] }}'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.tasks_per_node }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'

task_get_obs_goes_aod:
  <<: *default_task_verify_pre
  command: '&LOAD_MODULES_RUN_TASK; "get_obs" "&JOBSdir;/JREGIONAL_GET_VERIF_OBS"'
  envars:
    <<: *default_vars
    OBTYPE: 'GOESAOD'
    FHR: '{% for h in range(0, workflow.FCST_LEN_HRS+1) %}{{ " %02d" % h  }}{% endfor %}'
  native: '{% if platform.get("SCHED_NATIVE_CMD_HPSS") %}{{ platform.SCHED_NATIVE_CMD_HPSS }}{% else %}{{ platform.SCHED_NATIVE_CMD}}{% endif %}'
  partition: '{% if platform.get("PARTITION_HPSS") %}&PARTITION_HPSS;{% else %}None{% endif %}'
  queue: "&QUEUE_HPSS;"
  walltime: 02:00:00

task_get_obs_goes_adp:
