metatask_check_post_output_all_mems:
  var:
    mem: '{% if global.DO_ENSEMBLE %}{% for m in range(1, global.NUM_ENS_MEMBERS+1) %}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
  task_check_post_output_mem#mem#:
    <<: *default_task_verify_pre
    attrs:
      cycledefs: forecast
      maxtries: '1'
    command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_CHECK_POST_OUTPUT"'
    envars:
      <<: *default_vars
      ENSMEM_INDX: '#mem#'
    walltime: "{{ verification_resources.execution.check_post_output.walltime }}"
    dependency:
      # Metataskdep here is for the default running standalone post tasks. When running inline post,
      # or no forecast tasks at all, this section is replaced by logic in setup.py.
      metataskdep:
        attrs:
          metatask: run_post_mem#mem#_all_fhrs

