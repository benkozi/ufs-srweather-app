default_task_verify_det: &default_task_verify_det
  account: '&ACCOUNT;'
  attrs: &default_attrs
    cycledefs: forecast
    maxtries: '1'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    USHdir: '&USHdir;'
    PDY:
      cyclestr:
        value: '@Y@m@d'
    cyc:
      cyclestr:
        value: '@H'
    subcyc:
      cyclestr:
        value: '@M'
    LOGDIR:
      cyclestr:
        value: '&LOGDIR;'
    SLASH_ENSMEM_SUBDIR_OR_NULL: '{{ "/mem#mem#" if global.DO_ENSEMBLE }}'
    nprocs: '{{ verification_resources.execution.nodes * verification_resources.execution.tasks_per_node }}'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  memory: '{{ "2G" if user.MACHINE not in ["NOAACLOUD"] }}'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.tasks_per_node }}'
  queue: '&QUEUE_DEFAULT;'

metatask_GridStat_APCP_all_accums_all_mems:
  var:
    ACCUM_HH: '{% for ah in verification.VX_APCP_ACCUMS_HRS %}{% if workflow.FCST_LEN_HRS >= ah %}{{ "%02d " % ah }}{% endif %}{% endfor %}'
  metatask_GridStat_APCP#ACCUM_HH#h_all_mems:
    var:
      mem: '{% if global.DO_ENSEMBLE %}{% for m in range(1, global.NUM_ENS_MEMBERS+1) %}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
    task_run_MET_GridStat_vx_APCP#ACCUM_HH#h_mem#mem#:
      <<: *default_task_verify_det
      attrs:
        <<: *default_attrs
        maxtries: '2'
      command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GRIDSTAT_OR_POINTSTAT_VX"'
      envars:
        <<: *default_vars
        OBS_DIR: '&CCPA_OBS_DIR;'
        FIELD_GROUP: 'APCP'
        ACCUM_HH: '#ACCUM_HH#'
        METPLUSTOOLNAME: 'GRIDSTAT'
        OBTYPE: 'CCPA'
        ENSMEM_INDX: "#mem#"
        OBS_AVAIL_INTVL_HRS: '{{ verification.CCPA_OBS_AVAIL_INTVL_HRS }}'
        FCST_LEVEL: 'A#ACCUM_HH#'
        FCST_THRESH: 'all'
      memory: '{{  verification_resources.execution.deterministic.gridstat.memory if user.MACHINE not in ["NOAACLOUD"] }}'
      nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.deterministic.gridstat.tasks_per_node }}'
      walltime: "{{ verification_resources.execution.deterministic.gridstat.walltime }}"
      dependency:
        and:
          taskdep_pcpcombine_obs:
            attrs:
              task: run_MET_PcpCombine_APCP#ACCUM_HH#h_obs_CCPA
          taskdep_pcpcombine_fcst:
            attrs:
              task: run_MET_PcpCombine_APCP#ACCUM_HH#h_fcst_mem#mem#

metatask_GridStat_ASNOW_all_accums_all_mems:
  var:
    ACCUM_HH: '{% for ah in verification.VX_ASNOW_ACCUMS_HRS %}{% if workflow.FCST_LEN_HRS >= ah %}{{ "%02d " % ah }}{% endif %}{% endfor %}'
  metatask_GridStat_ASNOW#ACCUM_HH#h_all_mems:
    var:
      mem: '{% if global.DO_ENSEMBLE %}{% for m in range(1, global.NUM_ENS_MEMBERS+1) %}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
    task_run_MET_GridStat_vx_ASNOW#ACCUM_HH#h_mem#mem#:
      <<: *default_task_verify_det
      attrs:
        <<: *default_attrs
        maxtries: '2'
      command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GRIDSTAT_OR_POINTSTAT_VX"'
      envars:
        <<: *default_vars
        OBS_DIR: '&NOHRSC_OBS_DIR;'
        FIELD_GROUP: 'ASNOW'
        ACCUM_HH: '#ACCUM_HH#'
        METPLUSTOOLNAME: 'GRIDSTAT'
        OBTYPE: 'NOHRSC'
        ENSMEM_INDX: "#mem#"
        OBS_AVAIL_INTVL_HRS: '{{ verification.NOHRSC_OBS_AVAIL_INTVL_HRS }}'
        FCST_LEVEL: 'A#ACCUM_HH#'
        FCST_THRESH: 'all'
      memory: '{{  verification_resources.execution.deterministic.gridstat.memory if user.MACHINE not in ["NOAACLOUD"] }}'
      nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.deterministic.gridstat.tasks_per_node }}'
      walltime: "{{ verification_resources.execution.deterministic.gridstat.walltime }}"
      dependency:
        and:
          taskdep_pcpcombine_obs:
            attrs:
              task: run_MET_PcpCombine_ASNOW#ACCUM_HH#h_obs_NOHRSC
          taskdep_pcpcombine_fcst:
            attrs:
              task: run_MET_PcpCombine_ASNOW#ACCUM_HH#h_fcst_mem#mem#

metatask_GridStat_REFC_RETOP_all_mems:
  var:
    mem: '{% if global.DO_ENSEMBLE %}{% for m in range(1, global.NUM_ENS_MEMBERS+1) %}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
  metatask_GridStat_REFC_RETOP_mem#mem#:
    var:
      FIELD_GROUP: '{% for var in verification.VX_FIELD_GROUPS %}{% if var in ["REFC", "RETOP"] %}{{ "%s " % var }}{% endif %}{% endfor %}'
    task_run_MET_GridStat_vx_#FIELD_GROUP#_mem#mem#:
      <<: *default_task_verify_det
      command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GRIDSTAT_OR_POINTSTAT_VX"'
      envars:
        <<: *default_vars
        OBS_DIR: '&MRMS_OBS_DIR;'
        FIELD_GROUP: '#FIELD_GROUP#'
        METPLUSTOOLNAME: 'GRIDSTAT'
        OBTYPE: 'MRMS'
        ENSMEM_INDX: "#mem#"
        OBS_AVAIL_INTVL_HRS: '{{ verification.MRMS_OBS_AVAIL_INTVL_HRS }}'
        FCST_LEVEL: 'L0'
        FCST_THRESH: 'all'
      memory: '{{  verification_resources.execution.deterministic.gridstat.memory if user.MACHINE not in ["NOAACLOUD"] }}'
      nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.deterministic.gridstat.tasks_per_node }}'
      walltime: "{{ verification_resources.execution.deterministic.gridstat.walltime }}"
      dependency:
        and:
          # Check that the flag files that indicate that the get_obs_mrms tasks
          # are complete are all present before launching any PcpCombine task.
          sh_mrms_available:
            attrs:
              shell: /bin/bash
            command: find {{ workflow.WFLOW_FLAG_FILES_DIR }} -name "get_obs_mrms_*_complete.txt" -exec basename {} \; 2>/dev/null |
              grep -oE '[0-9]{8}' |
              awk -F/ -v s={{ workflow.OBS_DAYS_ALL_CYCLES_CUMUL[0] }} -v e={{ workflow.OBS_DAYS_ALL_CYCLES_CUMUL[-1] }} '($NF >= s && $NF <= e)' |
              test $(wc -l) -ge {{ workflow.OBS_DAYS_ALL_CYCLES_CUMUL|length }}
          datadep_post_files_exist:
            attrs:
              age: 00:00:00:30
            value:
              cyclestr:
                value: '{{ workflow.EXPTDIR }}/@Y@m@d@H/post_files_exist_mem#mem#.txt'

metatask_PointStat:
  var:
    FIELD_GROUP: '{% for var in verification.VX_FIELD_GROUPS %}{% if var in ["SFC", "UPA", "AOD", "PM25", "PM10"] %}{{ "%s " % var }}{% endif %}{% endfor %}'
    METAOBTYPE: '{% for var in verification.VX_FIELD_GROUPS %}{% if var =="SFC" or var =="UPA" %}NDAS {% elif var =="AOD" %}AERONET {% elif var =="PM25" or var =="PM10" %}AIRNOW {% endif %}{% endfor %}'
    METAOBS_DIR: '{% for var in verification.VX_FIELD_GROUPS %}{% if var =="SFC" or var =="UPA" %}&NDAS_OBS_DIR; {% elif var =="AOD" %}&AERONET_OBS_DIR; {% elif var =="PM25" or var =="PM10" %}&AIRNOW_OBS_DIR; {% endif %}{% endfor %}'
    METAOB_AVAIL_HRS: '{% for var in verification.VX_FIELD_GROUPS %}{% if var =="SFC" or var =="UPA" %} {{ verification.NDAS_OBS_AVAIL_INTVL_HRS }} {% elif var =="AOD" %}{{ verification.AERONET_OBS_AVAIL_INTVL_HRS }} {% elif var =="PM25" or var =="PM10" %}{{ verification.AIRNOW_OBS_AVAIL_INTVL_HRS }} {% endif %}{% endfor %}'
  metatask_PointStat_#FIELD_GROUP#_all_mems:
    var:
      mem: '{% if global.DO_ENSEMBLE %}{% for m in range(1, global.NUM_ENS_MEMBERS+1) %}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
    task_run_MET_PointStat_vx_#FIELD_GROUP#_mem#mem#:
      <<: *default_task_verify_det
      command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GRIDSTAT_OR_POINTSTAT_VX"'
      envars:
        <<: *default_vars
        OBS_DIR: '#METAOBS_DIR#'
        FIELD_GROUP: '#FIELD_GROUP#'
        METPLUSTOOLNAME: 'POINTSTAT'
        OBTYPE: '#METAOBTYPE#'
        ENSMEM_INDX: "#mem#"
        OBS_AVAIL_INTVL_HRS: '#METAOB_AVAIL_HRS#'
        FCST_LEVEL: 'all'
        FCST_THRESH: 'all'
      memory: '{{  verification_resources.execution.deterministic.gridstat.memory if user.MACHINE not in ["NOAACLOUD"] }}'
      nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.deterministic.pointstat.tasks_per_node }}'
      walltime: "{{ verification_resources.execution.deterministic.pointstat.walltime }}"
      dependency:
        and:
          # Check that the flag files that indicate that the Pb2NC tasks are
          # complete are all present before launching any PointStat task.
          sh_pb2nc_complete:
            attrs:
              shell: /bin/bash
            command: find {{ workflow.WFLOW_FLAG_FILES_DIR }} -name "#METAOBTYPE#_nc_obs_*_ready.txt" -exec basename {} \; 2>/dev/null |
              grep -oE '[0-9]{8}' |
              awk -F/ -v s={{ workflow.OBS_DAYS_ALL_CYCLES_INST[0] }} -v e={{ workflow.OBS_DAYS_ALL_CYCLES_INST[-1] }} '($NF >= s && $NF <= e)' |
              test $(wc -l) -ge {{ workflow.OBS_DAYS_ALL_CYCLES_INST|length }}
          datadep_post_files_exist:
            attrs:
              age: 00:00:00:30
            value:
              cyclestr:
                value: '{{ workflow.EXPTDIR }}/@Y@m@d@H/post_files_exist_mem#mem#.txt'
          or:
            not:
              taskvalid:
                attrs:
                  task: 'run_MET_PcpCombine_fcst_#FIELD_GROUP#_mem#mem#'
            taskdep:
              attrs:
                task: 'run_MET_PcpCombine_fcst_#FIELD_GROUP#_mem#mem#'
