metatask_mm_run_package:
  var:
    package: '{{ task_mm_prep.MM_EVAL_PACKAGES | join(" ") }}'
    package_tasks_per_node: '{{ task_mm_prep.execution.batchargs.tasks_per_node | join(" ") }}'
    package_walltime: '{{ task_mm_prep.execution.batchargs.walltime | join(" ") }}'
  task_mm_prep_#package#:
    <<: *default_aqm
    command: '&LOAD_MODULES_RUN_TASK; "mm_prep" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_PREP"'
    join:
      cyclestr:
        value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
    envars:
      <<: *default_vars
      nprocs: '#package_tasks_per_node#'
      MM_EVAL_PACKAGE: '#package#'
    nodes: '{{ task_mm_prep.execution.batchargs.nodes }}:ppn=#package_tasks_per_node#'
    walltime: '#package_walltime#'
    dependency:
      taskdep:
        attrs:
          task: run_fcst_mem000
  task_mm_run_#package#_save_paired:
    <<: *default_aqm
    command: '&LOAD_MODULES_RUN_TASK; "mm_run" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_RUN"'
    join:
      cyclestr:
        value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
    envars:
      <<: *default_vars
      nprocs: '{{ task_mm_run.execution.batchargs.nodes * task_mm_run.execution.batchargs.tasks_per_node }}'
      MM_EVAL_PACKAGE: '#package#'
      MM_EVAL_TASK: 'save_paired'
    nodes: '{{ task_mm_run.execution.batchargs.nodes }}:ppn={{ task_mm_run.execution.batchargs.tasks_per_node }}'
    walltime: '{{ task_mm_run.execution.batchargs.walltime }}'
    dependency:
      taskdep:
        attrs:
          task: mm_prep_#package#
  metatask_mm_run_#package#_task:
    var:
      task: '{% if task_mm_prep.MM_BASE_MODEL_EXPT_DIR is none %}{{ task_mm_run.MM_EVAL_TASKS_SINGLE_MODEL | join(" ") }}{% else %}{{ task_mm_run.MM_EVAL_TASKS_MULTI_MODEL | join(" ") }}{% endif %}'
    task_mm_run_#package#_#task#:
      <<: *default_aqm
      command: '&LOAD_MODULES_RUN_TASK; "mm_run" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_RUN"'
      join:
        cyclestr:
          value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
      envars:
        <<: *default_vars
        nprocs: '{{ task_mm_run.execution.batchargs.nodes * task_mm_run.execution.batchargs.tasks_per_node }}'
        MM_EVAL_PACKAGE: '#package#'
        MM_EVAL_TASK: '#task#'
      nodes: '{{ task_mm_run.execution.batchargs.nodes }}:ppn={{ task_mm_run.execution.batchargs.tasks_per_node }}'
      walltime: '{{ task_mm_run.execution.batchargs.walltime }}'
      dependency:
        taskdep:
          attrs:
            task: mm_run_#package#_save_paired
