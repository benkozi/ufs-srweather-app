default_aqm_task: &default_aqm
  account: '&ACCOUNT;'
  attrs:
    cycledefs: at_end
#    cycledef: '{{ workflow.DATE_LAST_CYCL }}00 {{ workflow.DATE_LAST_CYCL }}00 00:00:00'
    maxtries: '1'
  envvars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    HOMEdir: '&HOMEdir;'
#    PDY:
#      cyclestr:
#        value:  "@Y@m@d"
#    cyc:
#      cyclestr:
#        value:  "@H"
#    subcyc:
#      cyclestr:
#        value:  "@M"
    LOGDIR:
      cyclestr:
        value:  "&LOGDIR;"
#    SLASH_ENSMEM_SUBDIR: '&SLASH_ENSMEM_SUBDIR;'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'

task_melodies_monet_prep: #tdk: rename to task_melodies_monet_prep (also rename in command, J-Job, etc.)
  <<: *default_aqm
  command: '&LOAD_MODULES_RUN_TASK; "melodies_monet_prep" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_PREP"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  envvars:
    <<: *default_vars
    nprocs: '{{ task_melodies_monet_prep.execution.batchargs.nodes * task_melodies_monet_prep.execution.batchargs.tasks_per_node }}'
  nodes: '{{ task_melodies_monet_prep.execution.batchargs.nodes }}:ppn={{ task_melodies_monet_prep.execution.batchargs.tasks_per_node }}'
  walltime: '{{ task_melodies_monet_prep.execution.batchargs.walltime }}'
  dependency:
    taskdep:
      attrs:
        task: run_fcst_mem000
#      taskvalid:
#        attrs:
#          task: run_fcst_mem000

