default_aqm_task: &default_aqm
  account: '&ACCOUNT;'
  attrs:
    cycledefs: at_end
    maxtries: '1'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    HOMEdir: '&HOMEdir;'
    LOGDIR:
      cyclestr:
        value:  "&LOGDIR;"
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'


task_mm_prep_chem:
  <<: *default_aqm
  command: '&LOAD_MODULES_RUN_TASK; "mm_prep" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_PREP"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  envars:
    <<: *default_vars
    nprocs: '{{ melodies_monet_parm.aqm.packages.chem.execution.batchargs.nodes * melodies_monet_parm.aqm.packages.chem.execution.batchargs.tasks_per_node }}'
    MM_EVAL_PACKAGE: chem
  nodes: '{{ melodies_monet_parm.aqm.packages.chem.execution.batchargs.nodes }}:ppn={{ melodies_monet_parm.aqm.packages.chem.execution.batchargs.tasks_per_node }}'
  walltime: '{{ melodies_monet_parm.aqm.packages.chem.execution.batchargs.walltime }}'
  dependency:
    and:
      taskdep:
        attrs:
          task: run_fcst_mem000
      streq:
        left: run_package
        right: '{% if "chem" in melodies_monet_parm.aqm.packages.packages_to_run %}run_package{% endif %}'


task_mm_run_chem_save_paired:
  <<: *default_aqm
  command: '&LOAD_MODULES_RUN_TASK; "mm_run" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_RUN"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  envars:
    <<: *default_vars
    nprocs: '{{ melodies_monet_parm.aqm.tasks.execution.batchargs.nodes * melodies_monet_parm.aqm.tasks.execution.batchargs.tasks_per_node }}'
    MM_EVAL_PACKAGE: 'chem'
    MM_EVAL_TASK: 'save_paired'
  nodes: '{{ melodies_monet_parm.aqm.tasks.execution.batchargs.nodes }}:ppn={{ melodies_monet_parm.aqm.tasks.execution.batchargs.tasks_per_node }}'
  walltime: '{{ melodies_monet_parm.aqm.tasks.execution.batchargs.walltime }}'
  dependency:
    and:
      taskdep:
        attrs:

          task: mm_prep_chem

        streq:
          left: run_task
          right: '{% if "save_paired" not in melodies_monet_parm.aqm.packages.chem.tasks_to_exclude and ("scorecard" not in "save_paired" and melodies_monet_parm.aqm.base_model_expt_dir is not none) %}run_task{% endif %}'


