  command: '&LOAD_MODULES_RUN_TASK; "mm_prep" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_PREP"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  envars:
    <<: *default_vars
    nprocs: '{{ melodies_monet_parm.aqm.packages.aqs_pm.execution.batchargs.nodes * melodies_monet_parm.aqm.packages.aqs_pm.execution.batchargs.tasks_per_node }}'
    MM_EVAL_PACKAGE: aqs_pm
  nodes: '{{ melodies_monet_parm.aqm.packages.aqs_pm.execution.batchargs.nodes }}:ppn={{ melodies_monet_parm.aqm.packages.aqs_pm.execution.batchargs.tasks_per_node }}'
  walltime: '{{ melodies_monet_parm.aqm.packages.aqs_pm.execution.batchargs.walltime }}'
  dependency:
    and:
      or:
        not:
          taskvalid:
            attrs:
              task: run_fcst_mem000
        and:
          taskvalid:
            attrs:
              task: run_fcst_mem000
          taskdep:
            attrs:
              task: run_fcst_mem000
      streq:
        left: run_package
        right: '{% if melodies_monet_parm.aqm.packages.aqs_pm.active %}run_package{% endif %}'


