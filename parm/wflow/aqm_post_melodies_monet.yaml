metatask_melodies_monet_run_package:
  var:
    package: '{{ task_melodies_monet_prep.MM_EVAL_PACKAGES | join(" ") }}'
  task_melodies_monet_run_#package#_save_paired:
    <<: *default_aqm
    command: '&LOAD_MODULES_RUN_TASK; "melodies_monet_run" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_RUN"'
    join:
      cyclestr:
        value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
    envars:
      <<: *default_vars
      nprocs: '{{ task_melodies_monet_run.execution.batchargs.nodes * task_melodies_monet_run.execution.batchargs.tasks_per_node }}'
      MM_EVAL_PACKAGE: '#package#'
      MM_EVAL_TASK: 'save_paired'
    nodes: '{{ task_melodies_monet_run.execution.batchargs.nodes }}:ppn={{ task_melodies_monet_run.execution.batchargs.tasks_per_node }}'
    walltime: '{{ task_melodies_monet_run.execution.batchargs.walltime }}'
    dependency:
      taskdep:
        attrs:
          task: melodies_monet_prep
  metatask_melodies_monet_run_#package#_task:
    var:
#      task: '{{ task_melodies_monet_run.MM_EVAL_TASKS | join(" ") }}'
      task: '{% if task_melodies_monet_prep.MM_BASE_MODEL_EXPT_DIR is none %}["timeseries", "taylor", "spatial_bias", "spatial_overlay", "boxplot", "multi_boxplot", "csi", "stats"] | join(" "){% else %}["timeseries", "taylor", "spatial_bias", "spatial_overlay", "boxplot", "multi_boxplot", "csi", "stats", "scorecard_rmse", "scorecard_ioa", "scorecard_nmb", "scorecard_nme"] | join(" "){% endif %}'
    task_melodies_monet_run_#package#_#task#:
      <<: *default_aqm
      command: '&LOAD_MODULES_RUN_TASK; "melodies_monet_run" "&HOMEdir;/jobs/JSRW_AQM_MELODIES_MONET_RUN"'
      join:
        cyclestr:
          value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
      envars:
        <<: *default_vars
        nprocs: '{{ task_melodies_monet_run.execution.batchargs.nodes * task_melodies_monet_run.execution.batchargs.tasks_per_node }}'
        MM_EVAL_PACKAGE: '#package#'
        MM_EVAL_TASK: '#task#'
      nodes: '{{ task_melodies_monet_run.execution.batchargs.nodes }}:ppn={{ task_melodies_monet_run.execution.batchargs.tasks_per_node }}'
      walltime: '{{ task_melodies_monet_run.execution.batchargs.walltime }}'
      dependency:
        taskdep:
          attrs:
            task: melodies_monet_run_#package#_save_paired
