default_aqm_task: &default_aqm
  account: '&ACCOUNT;'
  attrs:
#    cycledefs: forecast
    cycledef:
      value: '{{ workflow.DATE_LAST_CYCL }} {{ workflow.DATE_LAST_CYCL }} 00:00:00'
    maxtries: '1'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    HOMEdir: '&HOMEdir;'
#    PDY:
#      cyclestr:
#        value:  "@Y@m@d"
#    cyc:
#      cyclestr:
#        value:  "@H"
#    subcyc:
#      cyclestr:
#        value:  "@M"
    LOGDIR:
      cyclestr:
        value:  "&LOGDIR;"
#    SLASH_ENSMEM_SUBDIR: '&SLASH_ENSMEM_SUBDIR;'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'

task_mm_pre_chem_eval:
  <<: *default_aqm
  command: '&LOAD_MODULES_RUN_TASK; "mm_pre_chem_eval" "&HOMEdir;/jobs/JSRW_AQM_MM_PRE_CHEM_EVAL"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  envars:
    <<: *default_vars
    nprocs: '{{ task_mm_pre_chem_eval.execution.batchargs.nodes * task_mm_pre_chem_eval.execution.batchargs.tasks_per_node }}'
  nodes: '{{ task_mm_pre_chem_eval.execution.batchargs.nodes }}:ppn={{ task_mm_pre_chem_eval.execution.batchargs.tasks_per_node }}'
  walltime: '{{ task_mm_pre_chem_eval.execution.batchargs.walltime }}'
  dependency:
    and:
      taskdep:
        attrs:
          task: run_fcst_mem#mem#
#      streq:
#        left:
#          cyclestr:
#            value: "@Y@m@d@H"
#        right: '{{ workflow.DATE_LAST_CYCL }}'
