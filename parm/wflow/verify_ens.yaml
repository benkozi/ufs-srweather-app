default_task_verify_ens: &default_task_verify_ens
  account: '&ACCOUNT;'
  attrs:
    cycledefs: forecast
    maxtries: '2'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    USHdir: '&USHdir;'
    PDY:
      cyclestr:
        value: '@Y@m@d'
    cyc:
      cyclestr:
        value: '@H'
    subcyc:
      cyclestr:
        value: '@M'
    LOGDIR:
      cyclestr:
        value: '&LOGDIR;'
    nprocs: '{{ verification_resources.execution.nodes * verification_resources.execution.tasks_per_node }}'
  join:
    cyclestr:
      value:  '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  memory: '{{ "2G" if user.MACHINE not in ["WCOSS2", "NOAACLOUD"] }}'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  nodes: '{{ verification_resources.execution.nodes }}:ppn={{ verification_resources.execution.tasks_per_node }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'

metatask_GenEnsProd_EnsembleStat_APCP_all_accums:
  var:
    ACCUM_HH: '{% for ah in verification.VX_APCP_ACCUMS_HRS %}{% if workflow.FCST_LEN_HRS >= ah %}{{ "%02d " % ah }}{% endif %}{% endfor %}'
  task_run_MET_GenEnsProd_vx_APCP#ACCUM_HH#h: &task_GenEnsProd_CCPA
    <<: *default_task_verify_ens
    command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GENENSPROD_OR_ENSEMBLESTAT"'
    envars: &envars_GenEnsProd_CCPA
      <<: *default_vars
      ACCUM_HH: '#ACCUM_HH#'
      OBS_DIR: '&CCPA_OBS_DIR;'
      FIELD_GROUP: 'APCP'
      METPLUSTOOLNAME: 'GENENSPROD'
      OBTYPE: 'CCPA'
      FCST_LEVEL: 'A#ACCUM_HH#'
      FCST_THRESH: 'all'
      OMP_NUM_THREADS: 4
    walltime: "{{ verification_resources.execution.ensemble.genensprod.default.walltime }}"
    dependency:
      metataskdep_pcpcombine_fcst:
        attrs:
          metatask: PcpCombine_APCP#ACCUM_HH#h_all_mems
  task_run_MET_EnsembleStat_vx_APCP#ACCUM_HH#h:
    <<: *task_GenEnsProd_CCPA
    envars:
      <<: *envars_GenEnsProd_CCPA
      METPLUSTOOLNAME: 'ENSEMBLESTAT'
      FCST_THRESH: 'none'
    walltime: "{{ verification_resources.execution.ensemble.ensemblestat.walltime }}"
    dependency:
      and:
        taskdep_pcpcombine_obs_ccpa: &taskdep_pcpcombine_obs_ccpa
          attrs:
            task: run_MET_PcpCombine_APCP#ACCUM_HH#h_obs_CCPA
        taskdep_genensprod:
          attrs:
            task: run_MET_GenEnsProd_vx_APCP#ACCUM_HH#h

