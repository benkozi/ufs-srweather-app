metatask_GenEnsProd_EnsembleStat_REFC_RETOP:
  var:
    FIELD_GROUP: '{% for var in verification.VX_FIELD_GROUPS %}{% if var in ["REFC", "RETOP"] %}{{ "%s " % var }}{% endif %}{% endfor %}'
  task_run_MET_GenEnsProd_vx_#FIELD_GROUP#: &task_GenEnsProd_MRMS
    <<: *default_task_verify_ens
    command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GENENSPROD_OR_ENSEMBLESTAT"'
    envars: &envars_GenEnsProd_MRMS
      <<: *default_vars
      ACCUM_HH: '01'
      OBS_DIR: '&MRMS_OBS_DIR;'
      FIELD_GROUP: '#FIELD_GROUP#'
      METPLUSTOOLNAME: 'GENENSPROD'
      OBTYPE: 'MRMS'
      FCST_LEVEL: 'L0'
      FCST_THRESH: 'all'
      OMP_NUM_THREADS: 4
    walltime: "{{ verification_resources.execution.ensemble.genensprod.default.walltime }}"
    dependency:
      and:
        metataskdep_check_post_output: &check_post_output
          attrs:
            metatask: check_post_output_all_mems
  task_run_MET_EnsembleStat_vx_#FIELD_GROUP#:
    <<: *task_GenEnsProd_MRMS
    envars:
      <<: *envars_GenEnsProd_MRMS
      METPLUSTOOLNAME: 'ENSEMBLESTAT'
      FCST_LEVEL: 'L0'
      FCST_THRESH: 'none'
    walltime: "{{ verification_resources.execution.ensemble.ensemblestat.walltime }}"
    dependency:
      and:
        sh_mrms_obs_available: &all_get_obs_mrms_complete
          attrs:
            shell: /bin/bash
          command: find {{ workflow.WFLOW_FLAG_FILES_DIR }} -name "get_obs_mrms_*_complete.txt" -exec basename {} \; 2>/dev/null |
            grep -oE '[0-9]{8}' |
            awk -F/ -v s={{ workflow.OBS_DAYS_ALL_CYCLES_INST[0] }} -v e={{ workflow.OBS_DAYS_ALL_CYCLES_INST[-1] }} '($NF >= s && $NF <= e)' |
            test $(wc -l) -ge {{ workflow.OBS_DAYS_ALL_CYCLES_INST|length }}
        taskdep_genensprod:
          attrs:
            task: run_MET_GenEnsProd_vx_#FIELD_GROUP#

metatask_GenEnsProd_EnsembleStat_SFC_UPA:
  var:
    FIELD_GROUP: '{% for var in verification.VX_FIELD_GROUPS %}{% if var in ["SFC", "UPA"] %}{{ "%s " % var }}{% endif %}{% endfor %}'
  task_run_MET_GenEnsProd_vx_#FIELD_GROUP#: &task_GenEnsProd_NDAS
    <<: *default_task_verify_ens
    command: '&LOAD_MODULES_RUN_TASK; "run_vx" "&JOBSdir;/JREGIONAL_RUN_MET_GENENSPROD_OR_ENSEMBLESTAT"'
    envars: &envars_GenEnsProd_NDAS
      <<: *default_vars
      OBS_DIR: '&NDAS_OBS_DIR;'
      FIELD_GROUP: '#FIELD_GROUP#'
      METPLUSTOOLNAME: 'GENENSPROD'
      OBTYPE: 'NDAS'
      ACCUM_HH: '01'
      FCST_LEVEL: 'all'
      FCST_THRESH: 'all'
      OMP_NUM_THREADS: 4
    walltime: "{{ verification_resources.execution.ensemble.genensprod.default.walltime }}"
    dependency:
      metataskdep_check_post_output:
         <<: *check_post_output
  task_run_MET_EnsembleStat_vx_#FIELD_GROUP#:
    <<: *task_GenEnsProd_NDAS
    envars:
      <<: *envars_GenEnsProd_NDAS
      METPLUSTOOLNAME: 'ENSEMBLESTAT'
    walltime: "{{ verification_resources.execution.ensemble.ensemblestat.walltime }}"
    dependency:
      and:
        # Check that the flag files that indicate that the Pb2NC tasks
        # are complete are all present before launching any PcpCombine task.
        sh_pb2nc_ndas_complete: &all_pb2nc_obs_ndas_complete
          attrs:
            shell: /bin/bash
          command: find {{ workflow.WFLOW_FLAG_FILES_DIR }} -name "NDAS_nc_obs_*_ready.txt" -exec basename {} \; 2>/dev/null |
            grep -oE '[0-9]{8}' |
            awk -F/ -v s={{ workflow.OBS_DAYS_ALL_CYCLES_INST[0] }} -v e={{ workflow.OBS_DAYS_ALL_CYCLES_INST[-1] }} '($NF >= s && $NF <= e)' |
            test $(wc -l) -ge {{ workflow.OBS_DAYS_ALL_CYCLES_INST|length }}
        taskdep_genensprod:
          attrs:
            task: run_MET_GenEnsProd_vx_#FIELD_GROUP#

metatask_GridStat_APCP_all_accums_ensmeanprob:
