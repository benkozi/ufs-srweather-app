metatask_plot_allvars:
  var:
    mem: '{% if global.DO_ENSEMBLE %}{%- for m in range(1, global.NUM_ENS_MEMBERS+1) -%}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
  metatask_plot_allvars_mem#mem#_all_fhrs:
    var:
      fhr: '{% for h in range(0, workflow.LONG_FCST_LEN+1) %}{{ " %03d" % h }}{% endfor %}'
      cycledef: '{% for h in range(0, workflow.LONG_FCST_LEN+1) %}{% if h <= workflow.FCST_LEN_CYCL|min %}forecast {% else %}long_forecast {% endif %}{% endfor %}'
    task_plot_allvars_mem#mem#_f#fhr#:
      command: '&LOAD_MODULES_RUN_TASK; "plot_allvars" "&JOBSdir;/JREGIONAL_PLOT_ALLVARS"'
      account: '&ACCOUNT;'
      attrs:
        cycledefs: forecast
        maxtries: '1'
      envars:
        GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
        USHdir: '&USHdir;'
        PDY:
          cyclestr:
            value:  "@Y@m@d"
        cyc:
          cyclestr:
            value:  "@H"
        subcyc:
          cyclestr:
            value:  "@M"
        LOGDIR:
          cyclestr:
            value:  "&LOGDIR;"
        SLASH_ENSMEM_SUBDIR: '&SLASH_ENSMEM_SUBDIR;'
        ENSMEM_INDX: '#mem#'
        nprocs: '{{ task_plot_allvars.execution.batchargs.nodes * task_plot_allvars.execution.batchargs.tasks_per_node }}'
        fhr: '#fhr#'
      native: '{{ platform.SCHED_NATIVE_CMD }}'
      exclusive: '{{ task_plot_allvars.execution.batchargs.exclusive }}'
      nodes: '{{ task_plot_allvars.execution.batchargs.nodes }}:ppn={{ task_plot_allvars.execution.batchargs.tasks_per_node }}'
      partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
      queue: '&QUEUE_DEFAULT;'
      walltime: '{{ task_plot_allvars.execution.batchargs.walltime }}'
      join:
        cyclestr:
          value:  '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
      dependency:
        or_do_post: &post_files_exist
          and_run_post: # If post was meant to run, wait on the whole post metatask
            taskvalid:
              attrs:
                task: run_post_mem#mem#_f#fhr#
            metataskdep:
              attrs:
                metatask: run_ens_post
          and_inline_post: # If inline post ran, wait on the forecast task to complete
            not:
              taskvalid:
                attrs:
                  task: run_post_mem#mem#_f#fhr#
            taskdep:
              attrs:
                task: run_fcst_mem#mem#
