default_task_post: &default_task
  account: '&ACCOUNT;'
  attrs:
    cycledefs: '#cycledef#'
    maxtries: '2'
  command: '&LOAD_MODULES_RUN_TASK; "run_post" "&JOBSdir;/JREGIONAL_RUN_POST"'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    USHdir: '&USHdir;'
    PDY:
      cyclestr:
        value: "@Y@m@d"
    cyc:
      cyclestr:
        value: "@H"
    subcyc:
      cyclestr:
        value: "@M"
    fhr: '#fhr#'
    SLASH_ENSMEM_SUBDIR: '&SLASH_ENSMEM_SUBDIR;'
    ENSMEM_INDX: '#mem#'
    nprocs: '{{ task_run_post.upp.execution.batchargs.nodes * task_run_post.upp.execution.batchargs.tasks_per_node }}'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  exclusive: '{{ task_run_post.upp.execution.batchargs.exclusive }}'
  nodes: "{{ task_run_post.upp.execution.batchargs.nodes }}:ppn={{ task_run_post.upp.execution.batchargs.tasks_per_node }}"
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'
  walltime: '{{ task_run_post.upp.execution.batchargs.walltime }}'

metatask_run_ens_post:
  var:
    mem: '{% if global.DO_ENSEMBLE %}{%- for m in range(1, global.NUM_ENS_MEMBERS+1) -%}{{ "%03d "%m }}{%- endfor -%} {% else %}{{ "000"|string }}{% endif %}'
  metatask_run_post_mem#mem#_all_fhrs:
    var:
      fhr: '{% for h in range(0, workflow.LONG_FCST_LEN+1) %}{{ " %03d" % h }}{% endfor %}'
      cycledef: '{% for h in range(0, workflow.LONG_FCST_LEN+1) %}{% if h <= workflow.FCST_LEN_CYCL|min %}forecast {% else %}long_forecast {% endif %}{% endfor %}'
    task_run_post_mem#mem#_f#fhr#:
      <<: *default_task
      dependency:
        or:
          taskdep:
            attrs:
              task: run_fcst_mem#mem#
          and:
            datadep_dyn:
              attrs:
                age: '05:00'
              value:
                cyclestr:
                  value: '&FCST_DIR;&SLASH_ENSMEM_SUBDIR;/dynf#fhr#.nc'
            datadep_phy:
              attrs:
                age: '05:00'
              value:
                cyclestr:
                  value: '&FCST_DIR;&SLASH_ENSMEM_SUBDIR;/phyf#fhr#.nc'

  metatask_run_sub_hourly_post:
    var:
      fhr: '{% for h in range(workflow.FCST_LEN_HRS) %}{{ " %03d" % h }}{% endfor %}'
    metatask_sub_hourly_post:
      var:
        fmn: '{% for min in range(0, 60, task_run_post.envvars.DT_SUBHOURLY_POST_MNTS) %}{{ " %02d" % min }}{% endfor %}'
      task_run_post_mem#mem#_f#fhr##fmn#: &subhourly_run_post_task
        <<: *default_task
        envars:
          <<: *default_vars
          fmn: '#fmn#'
        dependency:
          or:
            taskdep:
              attrs:
                task: run_fcst_mem#mem#
            and:
              datadep_dyn:
                attrs:
                  age: '05:00'
                value:
                  cyclestr:
                    value: '&FCST_DIR;&SLASH_ENSMEM_SUBDIR;/dynf#fhr#:#fmn#:00.nc'

              datadep_phy:
                attrs:
                  age: '05:00'
                value:
                  cyclestr:
                    value: '&FCST_DIR;&SLASH_ENSMEM_SUBDIR;/phyf#fhr#:#fmn#:00.nc'

  metatask_sub_hourly_last_hour_post:
    var:
      fhr: '{{ " %03d" % workflow.FCST_LEN_HRS }}'
      fmn: '00'
    task_run_post_mem#mem#_f#fhr##fmn#:
      <<: *subhourly_run_post_task
