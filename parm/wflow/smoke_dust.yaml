default_smoke_dust_task: &default_smoke_dust
  account: '&ACCOUNT;'
  attrs:
    cycledefs: forecast
    maxtries: '2'
  envars: &default_vars
    GLOBAL_VAR_DEFNS_FP: '&GLOBAL_VAR_DEFNS_FP;'
    HOMEdir: '&HOMEdir;'
    USHdir: '&USHdir;'
    envir: '&envir;'
    model_ver: '&model_ver;'
    KEEPDATA: '&KEEPDATA;'
    SENDCOM: '&SENDCOM;'
    COMROOT: '&COMROOT;'
    DATAROOT: '&DATAROOT;'
    DCOMROOT: '&DCOMROOT;'
    PDY:
      cyclestr:
        value:  "@Y@m@d"
    cyc: 
      cyclestr:
        value:  "@H"
    subcyc:
      cyclestr:
        value:  "@M"
    LOGDIR:
      cyclestr: 
        value:  "&LOGDIR;"
    nprocs: '{{ task_smoke_dust.execution.batchargs.nodes * task_smoke_dust.execution.batchargs.tasks_per_node }}'
    SLASH_ENSMEM_SUBDIR: '&SLASH_ENSMEM_SUBDIR;'
    ENSMEM_INDX: '#mem#'
  native: '{{ platform.SCHED_NATIVE_CMD }}'
  nodes: '{{ task_smoke_dust.execution.batchargs.nodes }}:ppn={{ task_smoke_dust.execution.batchargs.tasks_per_node }}'
  partition: '{{ "&PARTITION_DEFAULT;" if platform.get("PARTITION_DEFAULT") }}'
  queue: '&QUEUE_DEFAULT;'
  walltime: '{{ task_smoke_dust.execution.batchargs.walltime }}'

task_smoke_dust:
  <<: *default_smoke_dust
  command: '&LOAD_MODULES_RUN_TASK; "smoke_dust" "&HOMEdir;/jobs/JSRW_SMOKE_DUST"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  memory: '{{ task_smoke_dust.execution.batchargs.memory }}'
  dependency:
    and:
      or_grid:
        datadep_grid:
          attrs:
            age: 00:00:00:05
          value: '{{ task_make_grid.envvars.GRID_DIR }}/make_grid_task_complete.txt'
        streq:
          left: staged_grid
          right: '{% if not rocoto.get("tasks", {}).get("task_make_grid") %}staged_grid{% endif %}'
      or_orog:
        datadep_orog:
          attrs:
            age: 00:00:00:05
          value: '{{ task_make_orog.envvars.OROG_DIR }}/make_orog_task_complete.txt'
        streq:
          left: staged_orog
          right: '{% if not rocoto.get("tasks", {}).get("task_make_orog") %}staged_orog{% endif %}'
      or_sfc_climo:
        datadep_sfc_climo:
          attrs:
            age: 00:00:00:05
          value: '{{ task_make_sfc_climo.envvars.SFC_CLIMO_DIR }}/make_sfc_climo_task_complete.txt'
        streq:
          left: staged_sfc_climo
          right: '{% if not rocoto.get("tasks", {}).get("task_make_sfc_climo") %}staged_sfc_climo{% endif %}'
      or:
        datadep_coldstart:
          attrs:
            age: 00:00:00:05
          value:
            cyclestr:
              value: '{{ workflow.EXPTDIR }}/task_skip_coldstart_@Y@m@d@H.txt'
        datadep_warmstart_tracer:
          attrs:
            age: 00:00:00:05
          value:
            cyclestr:
              value: '&WARMSTART_CYCLE_DIR;/RESTART/@Y@m@d.@H@M@S.fv_tracer.res.tile1.nc'
        datadep_comin_tracer:
          attrs:
            age: 00:00:00:05
          value:
            - cyclestr:
                attrs:
                  offset: "-{{ workflow.INCR_CYCL_FREQ }}:00:00"
                value: '&COMIN_DIR;'
            - '/RESTART/'
            - cyclestr:
                value: '@Y@m@d.@H@M@S.fv_tracer.res.tile1.nc'

task_prepstart:
  <<: *default_smoke_dust
  command: '&LOAD_MODULES_RUN_TASK; "prepstart" "&HOMEdir;/jobs/JSRW_PREPSTART"'
  join:
    cyclestr:
      value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H&LOGEXT;'
  memory: 120G
  dependency:
    or_smoke_dust:
      not:
        taskvalid:
          attrs:
            task: smoke_dust
      taskdep:
        attrs:
          task: smoke_dust

