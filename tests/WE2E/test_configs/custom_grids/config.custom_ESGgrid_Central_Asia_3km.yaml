metadata:
  description: |-
    This test checks the capability of the workflow to have the user
    specify a new grid (as opposed to one of the predefined ones in the
    workflow) of ESGgrid type.
user:
  RUN_ENVIR: community
workflow:
  CCPP_PHYS_SUITE: FV3_HRRR_gf
  GRID_GEN_METHOD: ESGgrid
  DATE_FIRST_CYCL: '2022020300'
  DATE_LAST_CYCL: '2022020300'
  FCST_LEN_HRS: 6
  PREEXISTING_DIR_METHOD: rename
task_make_grid:
  ESGgrid_LON_CTR: 76.0
  ESGgrid_LAT_CTR: 37.0
  ESGgrid_DELX: 3000.0
  ESGgrid_DELY: 3000.0
  ESGgrid_NX: 420
  ESGgrid_NY: 300
  ESGgrid_WIDE_HALO_WIDTH: 6
  ESGgrid_PAZI: 0.0
task_get_extrn_ics:
  envvars:
    EXTRN_MDL_NAME_ICS: FV3GFS
    USE_USER_STAGED_EXTRN_FILES: true
    FV3GFS_FILE_FMT_ICS: netcdf
task_get_extrn_lbcs:
  envvars:
    EXTRN_MDL_NAME_LBCS: FV3GFS
    LBC_SPEC_INTVL_HRS: 3
    USE_USER_STAGED_EXTRN_FILES: true
    FV3GFS_FILE_FMT_LBCS: netcdf
task_run_fcst:
  envvars:
    DT_ATMOS: 45
  fv3:
    execution:
      batchargs:
        walltime: 01:00:00
  LAYOUT_X: 12
  LAYOUT_Y: 12
  BLOCKSIZE: 32
  QUILTING: true
  WRTCMP_write_groups: 1
  WRTCMP_write_tasks_per_group: !int '{{ LAYOUT_Y }}'
  WRTCMP_output_grid: lambert_conformal
  WRTCMP_cen_lon: !float '{{ task_make_grid.ESGgrid_LON_CTR }}'
  WRTCMP_cen_lat: !float '{{ task_make_grid.ESGgrid_LAT_CTR }}'
  WRTCMP_lon_lwr_left: 69.6
  WRTCMP_lat_lwr_left: 33.0
  WRTCMP_stdlat1: !float '{{ task_make_grid.ESGgrid_LAT_CTR }}'
  WRTCMP_stdlat2: !float '{{ task_make_grid.ESGgrid_LAT_CTR }}'
  WRTCMP_nx: 399
  WRTCMP_ny: 285
  WRTCMP_dx: !float '{{ task_make_grid.ESGgrid_DELX }}'
  WRTCMP_dy: !float '{{ task_make_grid.ESGgrid_DELY }}'
task_run_post:
  envvars:
    POST_OUTPUT_DOMAIN_NAME: custom_ESGgrid_central_asia
