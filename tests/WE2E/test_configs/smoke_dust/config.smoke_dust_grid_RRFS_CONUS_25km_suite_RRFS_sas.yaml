metadata:
  description: config for Smoke and Dust, RRFS_CONUS_25km, RRFS_sas suite
user:
  RUN_ENVIR: community
workflow:
  PREDEF_GRID_NAME: RRFS_CONUS_25km
  CCPP_PHYS_SUITE: RRFS_sas
  DATE_FIRST_CYCL: '2019072200'
  DATE_LAST_CYCL: '2019072206'
  INCR_CYCL_FREQ: 6
  FCST_LEN_HRS: 6
  COMPILER: intel
  DO_REAL_TIME: false
  COLDSTART: true
  PREEXISTING_DIR_METHOD: rename
nco:
  envir_default: we2e_smoke_dust
  NET_default: smoke_dust
  RUN_default: smoke_dust
rocoto:
  tasks:
    taskgroups: '{{ ["parm/wflow/prep.yaml", "parm/wflow/smoke_dust.yaml", "parm/wflow/coldstart.yaml", "parm/wflow/post.yaml"]|include }}'
    metatask_run_ensemble:
      task_run_fcst_mem#mem#:
        walltime: 02:00:00
task_get_extrn_ics:
  EXTRN_MDL_NAME_ICS: RAP
  EXTRN_MDL_ICS_OFFSET_HRS: 0
  USE_USER_STAGED_EXTRN_FILES: true
task_get_extrn_lbcs:
  EXTRN_MDL_NAME_LBCS: RAP
  LBC_SPEC_INTVL_HRS: 6
  EXTRN_MDL_LBCS_OFFSET_HRS: 0
  USE_USER_STAGED_EXTRN_FILES: true
task_run_fcst:
  RESTART_INTERVAL: 6 12 18 24
  QUILTING: true
  PRINT_ESMF: false
  DO_FCST_RESTART: false
task_run_post:
  POST_OUTPUT_DOMAIN_NAME: conus25km
  USE_CUSTOM_POST_CONFIG_FILE: false
global:
  DO_ENSEMBLE: false
  NUM_ENS_MEMBERS: 2
smoke_dust_parm:
  DO_SMOKE_DUST: true
  EBB_DCYCLE: 1
  SMOKE_DUST_FILE_PREFIX: "SMOKE_RRFS_data"

