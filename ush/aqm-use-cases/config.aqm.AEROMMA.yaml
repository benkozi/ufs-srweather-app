task_aqm_use_case_data_download:
  USE_AQM_S3_DATA_STAGE: true
  envars:
    AQM_STAGE_DST_DIR: "/gpfs/f6/bil-fire8/scratch/Benjamin.Koziol/sandbox/srw/benkozi/use-cases/expt_dirs/UFS-AQM-DATA"
task_nexus_emission:
  envvars:
    PPN_NEXUS_EMISSION: 20
    NNODES_NEXUS_EMISSION: 4
    OMP_NUM_THREADS_NEXUS_EMISSION: 2
task_run_fcst:
  fv3:
    execution:
      batchargs:
        walltime: 01:20:00
  envvars:
    DT_ATMOS: 180
    OMP_NUM_THREADS_RUN_FCST: 1
    PRINT_ESMF: false
    RESTART_INTERVAL: 12 24
    DO_FCST_RESTART: false
  QUILTING: true
task_run_post:
  envvars:
    POST_OUTPUT_DOMAIN_NAME: 793
    USE_CUSTOM_POST_CONFIG_FILE: false
global:
  DO_ENSEMBLE: false
  NUM_ENS_MEMBERS: 2
  HALO_BLEND: 0
