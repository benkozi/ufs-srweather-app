metadata:
  description: config for SRW-AQM evaluation
user:
  RUN_ENVIR: community
  MACHINE: GAEAC6 #tdk: set to a_machine
  ACCOUNT: bil-fire3 #tdk: set to an_account
workflow:
  USE_CRON_TO_RELAUNCH: true
  CRON_RELAUNCH_INTVL_MNTS: 3
  EXPT_SUBDIR: aqm_AQMNA13km_canopy_sens
  PREDEF_GRID_NAME: AQM_NA_13km
  CCPP_PHYS_SUITE: FV3_GFS_v16
  DATE_FIRST_CYCL: '2023080112'
#  DATE_LAST_CYCL:  '2023090112'
  DATE_LAST_CYCL:  '2023080212'
  DATE_LAST_CYCL_MM:  '2023082412'
#  DATE_LAST_CYCL_MM:  '2023090112'
#  DATE_LAST_CYCL:  '2023083112'  # Last cycle date for AEROMMA with all data staged
  INCR_CYCL_FREQ: 24
  FCST_LEN_HRS: 24
  PREEXISTING_DIR_METHOD: rename
  VERBOSE: true
  DEBUG: false
  COMPILER: intel
  DIAG_TABLE_TMPL_FN: diag_table_aqm.FV3_GFS_v16
  FIELD_TABLE_TMPL_FN: field_table_aqm.FV3_GFS_v16
  DO_REAL_TIME: false
  COLDSTART: false      # set to true for cold start
#  WARMSTART_CYCLE_DIR: "20230531"
  taskgroups:
#    - parm/wflow/prep.yaml
#    - parm/wflow/aqm_prep.yaml
#    - parm/wflow/coldstart.yaml
#    - parm/wflow/post.yaml
    - parm/wflow/aqm_post_melodies_monet.yaml # Uncomment to enable MELODIES MONET evaluation tasks. #tdk:comm
nco:
  envir_default: aqm_AQMNA13km_canopy_sens
  NET_default: aqm
  RUN_default: aqm
task_nexus_emission:
  envvars:
    PPN_NEXUS_EMISSION: 20
    NNODES_NEXUS_EMISSION: 4
    OMP_NUM_THREADS_NEXUS_EMISSION: 2
task_run_fcst:
  fv3:
    execution:
      batchargs:
        walltime: 01:20:00
  envvars:
    DT_ATMOS: 180
    OMP_NUM_THREADS_RUN_FCST: 1
    PRINT_ESMF: false
    RESTART_INTERVAL: 12 24
    DO_FCST_RESTART: false
  QUILTING: true
task_run_post:
  envvars:
    POST_OUTPUT_DOMAIN_NAME: 793
    USE_CUSTOM_POST_CONFIG_FILE: false
global:
  DO_ENSEMBLE: false
  NUM_ENS_MEMBERS: 2
  HALO_BLEND: 0

melodies_monet_parm:
  aqm:
    no_forecast: true
    models:
      base_candev_off:
        expt_dir: /gpfs/f6/bil-fire3/scratch/Irena.Ivanova/expt_dirs/aqmv8_candev_off
        plot_kwargs:
          color: g
      sens_candev_vdflev3_xkz:
        expt_dir: /gpfs/f6/bil-fire3/scratch/Irena.Ivanova/expt_dirs/aqmv8_candev_vdflev3_xkz.1
        plot_kwargs:
          color: m
    packages:
      aqs_pm:
        observation_template: /gpfs/f6/bil-fire3/world-shared/Observations/AQS/pm25_spec_daily/AQS_20230801_20230901.nc
        execution:
          batchargs:
            nodes: 1
            walltime: 03:00:00
      aqs_voc:
        observation_template: /gpfs/f6/bil-fire3/world-shared/Observations/AQS/vocs/AQS_20230801_20230901.nc
      chem:
        observation_template: /gpfs/f6/bil-fire3/world-shared/Observations/AirNow/AirNow_20230801_20230901.nc
      ish:
        observation_template: /gpfs/f6/bil-fire3/world-shared/Observations/ISH/ISH-Lite_US_20230801_20230901.nc
    tasks:
      execution:
        batchargs:
          nodes: 1
          walltime: 01:30:00
      stats_execution:
        batchargs:
          nodes: 1
          walltime: 07:00:00

cpl_aqm_parm:
  CPL_AQM: true

  USE_AQM_S3_DATA_STAGE: true
  USE_FIX_AQM_S3_DATA_STAGE: false
  AQM_STAGE_DST_DIR: "/gpfs/f6/bil-fire8/scratch/Benjamin.Koziol/data/aqm-use-case-download" #tdk:reset

  DO_AQM_CHEM_LBCS: true
  DO_AQM_GEFS_LBCS: true
  DO_AQM_DUST: true
  DO_AQM_CANOPY: false
  DO_AQM_PRODUCT: true
  DO_AQM_SAVE_AIRNOW_HIST: false
  DO_AQM_SAVE_FIRE: false
  AQM_BIO_FILE: BEIS_RRFScmaq_C775.ncf
  AQM_DUST_FILE_PREFIX: FENGSHA_p8_10km_inputs
  AQM_DUST_FILE_SUFFIX: .nc  
  AQM_CANOPY_FILE_PREFIX: gfs.t12z.geo
  AQM_CANOPY_FILE_SUFFIX: .canopy_regrid.nc
  AQM_FIRE_FILE_PREFIX: Hourly_Emissions_regrid_NA_13km
  AQM_FIRE_FILE_SUFFIX: _h72.nc
  AQM_RC_FIRE_FREQUENCY: hourly
  AQM_LBCS_FILES: am4_bndy.c793.2019<MM>.v1.nc
  AQM_GEFS_FILE_PREFIX: gfs
  AQM_GEFS_FILE_CYC: '00'
  NEXUS_GRID_FN: grid_spec_793.nc
  NUM_SPLIT_NEXUS: 3
