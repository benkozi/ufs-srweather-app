metadata:
  description: config for SRW-AQM, AQM_NA_13km, warm-start
user:
  RUN_ENVIR: community
  MACHINE: gaeac6
  ACCOUNT: bil-fire3
workflow:
  USE_CRON_TO_RELAUNCH: true
  CRON_RELAUNCH_INTVL_MNTS: 3
  EXPT_BASEDIR: /gpfs/f6/bil-fire3/scratch/Patrick.C.Campbell/expt_dirs
  EXPT_SUBDIR: aqmv8p1_testbed_AQMNA13km_warmstart
  PREDEF_GRID_NAME: AQM_NA_13km
  CCPP_PHYS_SUITE: FV3_GFS_v16
  DATE_FIRST_CYCL: '2023080112'
  DATE_LAST_CYCL: '2023080212'
  INCR_CYCL_FREQ: 24
  FCST_LEN_HRS: 24
  PREEXISTING_DIR_METHOD: rename
  VERBOSE: true
  DEBUG: false
  COMPILER: intel
  DIAG_TABLE_TMPL_FN: diag_table_aqm.FV3_GFS_v16
  FIELD_TABLE_TMPL_FN: field_table_aqm.FV3_GFS_v16
  DO_REAL_TIME: false
  COLDSTART: false      # set to true for cold start
  WARMSTART_CYCLE_DIR: '/gpfs/f6/bil-fire3/world-shared/AQM_Testbed/'  # for gaeac6
#  WARMSTART_CYCLE_DIR: '/scratch2/NAGAPE/epic/SRW-AQM_DATA/aqm_data/restart/2023111000' # for hera
#  WARMSTART_CYCLE_DIR: '/work/noaa/epic/SRW-AQM_DATA/aqm_data/restart/2023111000' # for orion/hercules
#  WARMSTART_CYCLE_DIR: '/glade/work/chanhooj/SRW-AQM_DATA/aqm_data/restart/2023111000' # for derecho
nco:
  envir_default: test_aqm_warmstart
  NET_default: aqm
  RUN_default: aqm
  PTMP: /gpfs/f6/bil-fire3/scratch/Patrick.C.Campbell/expt_dirs/aqmv8p1_testbed_AQMNA13km_warmstart
rocoto:
  tasks:
    taskgroups: '{{ ["parm/wflow/prep.yaml", "parm/wflow/aqm_prep.yaml", "parm/wflow/coldstart.yaml", "parm/wflow/post.yaml"]|include }}'
#    task_aqm_ics_ext:    # uncomment this in case of COLDSTART: true
    metatask_run_ensemble:
      task_run_fcst_mem#mem#:
        walltime: 01:20:00
task_get_extrn_ics:
  EXTRN_MDL_NAME_ICS: FV3GFS
  FV3GFS_FILE_FMT_ICS: netcdf
  EXTRN_MDL_ICS_OFFSET_HRS: 0
task_get_extrn_lbcs:
  EXTRN_MDL_NAME_LBCS: FV3GFS
  LBC_SPEC_INTVL_HRS: 6
  FV3GFS_FILE_FMT_LBCS: netcdf
  EXTRN_MDL_LBCS_OFFSET_HRS: 0
#PPN_NEXUS_EMISSION is 96 by default and it is too many and will fail
task_nexus_emission:
  PPN_NEXUS_EMISSION: 20
  NNODES_NEXUS_EMISSION: 4
  OMP_NUM_THREADS_NEXUS_EMISSION: 2
task_run_fcst:
  OMP_NUM_THREADS_RUN_FCST: 1
  DT_ATMOS: 180
  LAYOUT_X: 50
  LAYOUT_Y: 34
  BLOCKSIZE: 16
  RESTART_INTERVAL: 12 24
  QUILTING: true
  PRINT_ESMF: false
  DO_FCST_RESTART: false
task_run_post:
  POST_OUTPUT_DOMAIN_NAME: 793
  USE_CUSTOM_POST_CONFIG_FILE: false
global:
  DO_ENSEMBLE: false
  NUM_ENS_MEMBERS: 2
  HALO_BLEND: 0
task_point_source:
  PT_SRC_SUBDIR: "NEMO/NEI2019/v2023-03/PT"
cpl_aqm_parm:
  CPL_AQM: true
  DO_AQM_CHEM_LBCS: true
  DO_AQM_GEFS_LBCS: true
  DO_AQM_DUST: true
  DO_AQM_CANOPY: false
  DO_AQM_PRODUCT: true
  DO_AQM_SAVE_AIRNOW_HIST: false
  DO_AQM_SAVE_FIRE: false
  AQM_BIO_FILE: BEIS_RRFScmaq_C775.ncf
  AQM_DUST_FILE_PREFIX: FENGSHA_p8_10km_inputs
  AQM_DUST_FILE_SUFFIX: .nc  
  AQM_CANOPY_FILE_PREFIX: gfs.t12z.geo
  AQM_CANOPY_FILE_SUFFIX: .canopy_regrid.nc
  COMINfire_default: /gpfs/f6/bil-fire3/world-shared/AQM_Testbed/RAVE_fire/RAVE_v2
#  AQM_FIRE_FILE_PREFIX: Hourly_Emissions_regrid_NA_13km
#  AQM_FIRE_FILE_SUFFIX: _h72.nc
  AQM_RC_FIRE_FREQUENCY: hourly
  AQM_LBCS_FILES: am4_bndy.c793.2019<MM>.v1.nc
  COMINgefs_default: /gpfs/f6/bil-fire3/world-shared/AQM_Testbed/GEFS_Aerosol
  AQM_GEFS_FILE_PREFIX: gfs
  AQM_GEFS_FILE_CYC: '00'
  NEXUS_GFS_SFC_DIR: /gpfs/f6/bil-fire3/world-shared/AQM_Testbed/GFS_SFC_DATA
  NEXUS_GRID_FN: grid_spec_793.nc
  NUM_SPLIT_NEXUS: 3
