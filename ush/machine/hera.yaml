platform:
  WORKFLOW_MANAGER: rocoto
  NCORES_PER_NODE: 40
  SCHED: slurm
  WE2E_TEST_DATA: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop
  TEST_CCPA_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/ccpa/proc'
  TEST_NOHRSC_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/nohrsc/proc'
  TEST_MRMS_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/mrms/proc'
  TEST_NDAS_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/ndas/proc'
  TEST_AERONET_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/aeronet'
  TEST_AIRNOW_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/airnow'
  TEST_GDAS_OBS_DIR: '{{ platform.WE2E_TEST_DATA }}/obs_data/gdas'
  DOMAIN_PREGEN_BASEDIR: '{{ platform.WE2E_TEST_DATA }}/FV3LAM_pregen'
  PARTITION_DEFAULT: hera
  QUEUE_DEFAULT: batch
  PARTITION_FCST: hera
  QUEUE_FCST: batch
  PARTITION_HPSS: service
  QUEUE_HPSS: batch
  RUN_CMD_FCST: srun --export=ALL
  RUN_CMD_POST: srun --export=ALL
  RUN_CMD_PRDGEN: srun --export=ALL
  RUN_CMD_SERIAL: time
  RUN_CMD_UTILS: srun --export=ALL
  RUN_CMD_NEXUS: srun -n ${nprocs} --export=ALL
  RUN_CMD_AQMLBC: srun --export=ALL -n ${numts}
  SCHED_NATIVE_CMD: "--export=NONE"
  SCHED_NATIVE_CMD_HPSS: "-n 1 --export=NONE"
  PRE_TASK_CMDS: '{ ulimit -s unlimited; ulimit -a; }'
  TEST_EXTRN_MDL_SOURCE_BASEDIR: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/input_model_data
  TEST_AQM_INPUT_BASEDIR: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/aqm_data
  TEST_PREGEN_BASEDIR: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/FV3LAM_pregen
  TEST_ALT_EXTRN_MDL_SYSBASEDIR_ICS: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/dummy_FV3GFS_sys_dir
  TEST_ALT_EXTRN_MDL_SYSBASEDIR_LBCS: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/dummy_FV3GFS_sys_dir
  TEST_VX_FCST_INPUT_BASEDIR: '{{ "/scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/output_data/fcst_" }}{{ "ens" if (global.NUM_ENS_MEMBERS > 0) else "det" }}{{ "/{{workflow.PREDEF_GRID_NAME}}" }}{% raw %}{% endraw %}'
  FIXaer: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_aer
  FIXgsm: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_am
  FIXlut: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_lut
  FIXorg: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_orog
  FIXsfc: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_sfc_climo
  FIXshp: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/NaturalEarth
  FIXaqm: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_aqm_v8/fix/fix_aqm
  FIXemis: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_emis/fix_emis
  FIXsmoke: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_smoke
  FIXupp: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_upp
  FIXcrtm: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/fix/fix_crtm
  EXTRN_MDL_DATA_STORES: hpss aws nomads

cpl_aqm_parm:
  COMINfire_default: /scratch4/NAGAPE/epic/role-epic/hera/SRW-AQM_DATA/aqm_data/RAVE_fire
  COMINgefs_default: /scratch4/NAGAPE/epic/role-epic/hera/SRW-AQM_DATA/aqm_data/GEFS_DATA
  NEXUS_GFS_SFC_DIR: /scratch4/NAGAPE/epic/role-epic/hera/SRW-AQM_DATA/aqm_data/GFS_SFC_DATA

smoke_dust_parm:
  COMINsmoke_default: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/data_smoke_dust/RAVE_smoke_dust
  COMINrave_default: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/data_smoke_dust/RAVE_fire

rocoto:
  tasks:
    metatask_run_ensemble:
      task_run_fcst_mem#mem#:
        native: '--cpus-per-task {{ task_run_fcst.fv3.execution.threads // 1 }} --exclusive {{ platform.SCHED_NATIVE_CMD }}'

fire:
  envvars:
    FIRE_INPUT_DIR: /scratch3/NCEPDEV/nems/role.epic/hera/UFS_SRW_data/develop/UFS_FIRE/2020081318
